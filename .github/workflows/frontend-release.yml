name: Frontend Build & Deploy

on:
  push:
    branches:
      - english
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  IMAGE_NAME: english_tools_frontend
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      # 3. 安装 pnpm
      - name: Install latest pnpm globally
        run: npm install -g pnpm@10.33.4

      # 4. 安装依赖并构建前端
      - name: Install and Build Frontend
        env:
          PNPM_ONLY_BUILT_DEPENDENCIES_IGNORE_SCRIPTS: true
        run: |
          cd frontend
          pnpm install
          pnpm build

      # 5. 设置 QEMU 模拟（支持 ARM 架构）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # 6. 设置 Buildx Builder（docker-container 驱动，支持 multi-platform）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
          install: true

      # 7. 登录 GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 8. 构建并推送 Docker 镜像（多平台、支持缓存）
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:cache,mode=max
